name: Sync GitBook to Dify

on:
  push:
      branches: [main]
          paths:
                - '**.md'
                  workflow_dispatch:

                  jobs:
                    sync:
                        runs-on: ubuntu-latest
                            timeout-minutes: 120

                                steps:
                                      - name: Sync via GitHub API
                                              env:
                                                        DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
                                                                  DIFY_DATASET_ID: ${{ secrets.DIFY_DATASET_ID }}
                                                                            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                                                                                      REPO: ${{ github.repository }}
                                                                                              run: |
                                                                                                        python3 - << 'PYEOF'
                                                                                                                  import os, json, requests, hashlib, time
                                                                                                                  
                                                                                                                            DIFY_API_KEY = os.environ["DIFY_API_KEY"]
                                                                                                                                      DIFY_DATASET_ID = os.environ["DIFY_DATASET_ID"]
                                                                                                                                                GH_TOKEN = os.environ["GH_TOKEN"]
                                                                                                                                                          REPO = os.environ["REPO"]
                                                                                                                                                          
                                                                                                                                                                    gh_headers = {"Authorization": f"token {GH_TOKEN}"}
                                                                                                                                                                              dify_headers = {"Authorization": f"Bearer {DIFY_API_KEY}"}
                                                                                                                                                                              
                                                                                                                                                                                        def get_all_md_files(path=""):
                                                                                                                                                                                                      url = f"https://api.github.com/repos/{REPO}/contents/{path}"
                                                                                                                                                                                                                    res = requests.get(url, headers=gh_headers)
                                                                                                                                                                                                                                  items = res.json()
                                                                                                                                                                                                                                                files = []
                                                                                                                                                                                                                                                              for item in items:
                                                                                                                                                                                                                                                                                if item["type"] == "dir":
                                                                                                                                                                                                                                                                                                      files.extend(get_all_md_files(item["path"]))
                                                                                                                                                                                                                                                                                                                        elif item["name"].endswith(".md"):
                                                                                                                                                                                                                                                                                                                                              files.append(item)
                                                                                                                                                                                                                                                                                                                                                            return files
                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                      def get_dify_docs():
                                                                                                                                                                                                                                                                                                                                                                                    res = requests.get(
                                                                                                                                                                                                                                                                                                                                                                                                      f"https://api.dify.ai/v1/datasets/{DIFY_DATASET_ID}/documents?limit=100",
                                                                                                                                                                                                                                                                                                                                                                                                                        headers=dify_headers
                                                                                                                                                                                                                                                                                                                                                                                                                                      )
                                                                                                                                                                                                                                                                                                                                                                                                                                                    return {d["name"]: d["id"] for d in res.json().get("data", [])}
                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                              def safe_name(name):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if len(name.encode("utf-8")) > 200:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              return hashlib.md5(name.encode()).hexdigest() + ".md"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return name
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      def upload_with_retry(url, headers, files_payload, data_payload, max_retries=5):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    wait = 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  for attempt in range(max_retries):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    res = requests.post(url, headers=headers, files=files_payload, data=data_payload)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      if res.status_code == 200:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return res
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              elif res.status_code == 403:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    print(f"  Rate limit. Waiting {wait}s... (attempt {attempt+1}/{max_retries})")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          time.sleep(wait)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                wait = min(wait * 2, 60)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  else:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        print(f"  Error {res.status_code}: {res.text[:100]}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              return res
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return res
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      md_files = get_all_md_files()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                dify_docs = get_dify_docs()
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          print(f"Found {len(md_files)} markdown files")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    success = 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              failed = 0
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        for i, f in enumerate(md_files):
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      original_name = f["name"]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    lookup_name = safe_name(original_name)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  content_res = requests.get(f["download_url"], headers=gh_headers)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                content = content_res.content
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              print(f"[{i+1}/{len(md_files)}] {original_name}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            files_payload = {"file": (lookup_name, content, "text/markdown")}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          data_payload = {"data": json.dumps({
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "indexing_technique": "economy",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              "process_rule": {"mode": "automatic"}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            })}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if lookup_name in dify_docs:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            doc_id = dify_docs[lookup_name]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              endpoint = f"https://api.dify.ai/v1/datasets/{DIFY_DATASET_ID}/documents/{doc_id}/update-by-file"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            else:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              endpoint = f"https://api.dify.ai/v1/datasets/{DIFY_DATASET_ID}/document/create-by-file"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            res = upload_with_retry(endpoint, dify_headers, files_payload, data_payload)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          if res.status_code == 200:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            success += 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          else:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            failed += 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              print(f"  Failed: {res.text[:100]}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            time.sleep(2)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      print(f"\n完了: 成功={success}, 失敗={failed}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                PYEOF
