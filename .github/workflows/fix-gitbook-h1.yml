name: Fix GitBook Sync (H1, frontmatter, move to ja/, fix image paths)

on:
  push:
    branches:
      - main

jobs:
  fix-gitbook:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, 'GITBOOK-') &&
      !contains(github.event.head_commit.message, 'auto:')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Process GitBook sync
        run: |
          python3 - << 'PYEOF'
          import os, re, shutil

          SKIP_FILES = {'README.md', 'SUMMARY.md'}

          # ── 1. SUMMARY.mdからタイトルマッピングを作成 ──
          summary_map = {}
          if os.path.exists('SUMMARY.md'):
              with open('SUMMARY.md', 'r', encoding='utf-8') as f:
                  for line in f:
                      m = re.search(r'\[(.+?)\]\((.+?)\)', line)
                      if m:
                          title, path = m.group(1), m.group(2)
                          fname = os.path.basename(path)
                          summary_map[fname] = title
              print(f"SUMMARY map: {len(summary_map)} entries")

          # ── 2. ルートのmdファイルをja/に移動 ──
          os.makedirs('ja', exist_ok=True)
          moved = 0
          for fname in os.listdir('.'):
              if not fname.endswith('.md') or fname in SKIP_FILES:
                  continue
              src = fname
              dst = os.path.join('ja', fname)
              shutil.move(src, dst)
              moved += 1
              print(f"  Moved: {fname} -> ja/{fname}")
          print(f"Moved {moved} files to ja/")

          # ── 3. ja/内の全mdファイルを処理 ──
          fixed_count = 0
          for fname in os.listdir('ja'):
              if not fname.endswith('.md'):
                  continue
              path = os.path.join('ja', fname)
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()

              changed = False

              # 3a. フロントマターがなければ追加
              if not content.startswith('---'):
                  title = summary_map.get(fname, fname.replace('.md', '').replace('-', ' ').title())
                  content = f'---\ntitle: {title}\n---\n\n{content}'
                  changed = True

              # 3b. フロントマターにtitleがあればH1を削除
              if content.startswith('---'):
                  end = content.find('\n---', 3)
                  if end != -1:
                      frontmatter = content[:end + 4]
                      body = content[end + 4:]
                      if re.search(r'^title:', frontmatter, re.MULTILINE):
                          body_fixed = re.sub(r'^\n*# .+\n?', '\n', body, count=1)
                          if body_fixed != body:
                              content = frontmatter + body_fixed
                              changed = True

              # 3c. 画像パスを修正 → /images/ (Mintlify用)
              if '.gitbook/assets/' in content:
                  content = content.replace('../.gitbook/assets/', '/images/')
                  content = content.replace('.gitbook/assets/', '/images/')
                  changed = True

              if changed:
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  fixed_count += 1
                  print(f"  Fixed: {fname}")

          print(f"Total: {fixed_count} files processed")
          PYEOF

      - name: Copy images from .gitbook/assets to images/
        run: |
          if [ -d ".gitbook/assets" ]; then
            mkdir -p images
            cp -f .gitbook/assets/* images/ 2>/dev/null || true
            echo "Copied images to images/"
          fi

      - name: Update docs.json navigation with new pages
        run: |
          python3 - << 'PYEOF'
          import json, os

          DEFAULT_GROUP = "未分類"
          # 非表示扱いとするファイル名（拡張子なし）
          HIDDEN = {"faq-tenpurto", "suttogaido-tenpurto"}

          if not os.path.exists('docs.json'):
              print("docs.json not found; skipping")
              raise SystemExit(0)

          with open('docs.json', encoding='utf-8') as f:
              docs = json.load(f)

          changed = False
          for lang_config in docs.get('navigation', {}).get('languages', []):
              lang = lang_config['language']
              if not os.path.isdir(lang):
                  continue

              files_in_dir = {
                  os.path.splitext(fn)[0]
                  for fn in os.listdir(lang)
                  if fn.endswith('.md')
              }

              # 既存ナビ登録ページ
              existing = set()
              for group in lang_config['groups']:
                  for page in group['pages']:
                      existing.add(page.replace(f'{lang}/', '', 1))

              # 新規ファイル
              new_pages = sorted(
                  f for f in files_in_dir
                  if f not in existing and f not in HIDDEN
              )

              if not new_pages:
                  continue

              # 「未分類」グループを探す／作成
              misc = next((g for g in lang_config['groups'] if g['group'] == DEFAULT_GROUP), None)
              if not misc:
                  misc = {'group': DEFAULT_GROUP, 'pages': []}
                  lang_config['groups'].append(misc)

              for f in new_pages:
                  page = f'{lang}/{f}'
                  if page not in misc['pages']:
                      misc['pages'].append(page)
                      print(f"  Added {page} to {DEFAULT_GROUP}")
                      changed = True

          if changed:
              with open('docs.json', 'w', encoding='utf-8') as f:
                  json.dump(docs, f, ensure_ascii=False, indent=2)
                  f.write('\n')
              print("docs.json updated")
          else:
              print("No new pages; docs.json unchanged")
          PYEOF

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --cached --quiet && [ -z "$(git ls-files --others --exclude-standard)" ] || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "auto: process GitBook sync (move to ja/, fix H1, fix image paths, update navigation)"
          git push
